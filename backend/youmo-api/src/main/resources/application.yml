spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/youmo_dev?stringtype=unspecified
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  # type-aliases-package: com.youmo.common.entity  # 暂不启用，Entity 名 Character 与 java.lang.Character 冲突
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  port: 8080

logging:
  level:
    com.youmo: DEBUG
    org.flywaydb: INFO
