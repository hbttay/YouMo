spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/youmo_dev?stringtype=unspecified}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: false

# MyBatis — Phase 2 启用
# mybatis:
#   mapper-locations: classpath:mapper/**/*.xml
#   configuration:
#     map-underscore-to-camel-case: true

server:
  port: ${SERVER_PORT:8080}

# JWT — 生产环境通过环境变量注入
jwt:
  secret: ${JWT_SECRET:}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

# DeepSeek AI — 通过环境变量注入
deepseek:
  api-key: ${DEEPSEEK_API_KEY:}
  base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}

# Embedding — 本地 BGE-small-zh 微服务 (scripts/embedding_service.py)
embedding:
  api-key: ${EMBEDDING_API_KEY:}
  base-url: ${EMBEDDING_BASE_URL:http://127.0.0.1:5010}
  model: ${EMBEDDING_MODEL:BAAI/bge-small-zh-v1.5}

logging:
  level:
    com.youmo: DEBUG
    org.flywaydb: INFO
    org.springframework.security: INFO
